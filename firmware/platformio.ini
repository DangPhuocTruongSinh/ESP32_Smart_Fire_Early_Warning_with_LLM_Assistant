; PlatformIO Project Configuration File
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
;
; Docs: https://docs.platformio.org/page/projectconf.html

; ── Base config shared by all environments ──────────────────────────────────
[common]
platform  = espressif32
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps_base =
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  knolleary/PubSubClient
  bblanchon/ArduinoJson

; ── Dev build — rule-based only, no TFLite (current hardware) ───────────────
[env:esp32dev]
extends       = common
board         = esp32dev
upload_port   = /dev/ttyUSB0

lib_deps = ${common.lib_deps_base}

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DUSE_RULE_BASED=1       ; Dùng threshold cũ (không cần TFLite Micro)

; ── ML build — CNN1D TFLite Micro (cần đầy đủ sensor) ──────────────────────
; Yêu cầu:
;   1. Chạy: python firmware/convert_model.py   → sinh firmware/src/model_data.h
;   2. Gắn thêm sensor: MQ-7 (CO), SGP30 (VOC/H2), PMS5003 (PM), UV sensor
;   3. Board có ≥ 4 MB flash — Ai-Thinker ESP32-S (32Mbits) tương thích
[env:esp32dev-ml]
extends       = common
board         = esp32dev
upload_port   = /dev/ttyUSB0

; huge_app: 3 MB app / 1 MB SPIFFS — cần thiết cho TFLite Micro (~300 KB) + model (~100 KB)
board_build.partitions = huge_app.csv

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DUSE_TFLITE=1           ; Kích hoạt CNN1D inference
  -DTENSOR_ARENA_SIZE=50*1024

lib_deps =
  ${common.lib_deps_base}
  ; TFLite Micro Arduino — hỗ trợ CONV_2D, AVERAGE_POOL_2D, MEAN, FULLY_CONNECTED, SOFTMAX
  https://github.com/tensorflow/tflite-micro-arduino-examples
  ; Sensor thêm
  adafruit/Adafruit SGP30 Sensor         ; VOC + H2 (I2C)
  adafruit/Adafruit PM25 AQI Sensor      ; PMS5003 PM0.5/1.0/2.5 (UART)

